<!DOCTYPE html>
<html>
<head>
    <title>Login Page</title>

    <style>
        body {
            margin: 0;
            font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;

            background-image: url("login.png");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;

            height: 100vh;

            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .title {
            font-size: 40px;
            font-weight: bold;
            color: white;
            margin-top: 60px;
            text-shadow: 3px 3px 10px black;
        }

        .login-container {
            width: 320px;
            margin-top: 100px;
            padding: 25px;
            background: rgba(255, 255, 255, 0.9);
            text-align: center;
            border-radius: 12px;
        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 12px 0;
            border: 1px solid #aaa;
            border-radius: 5px;
        }

        button {
            width: 95%;
            padding: 10px;
            margin-top: 20px;
            background-color: #333;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #555;
        }
    </style>

</head>
<body>

<div class="title">Loren Eduventure</div>

<div class="login-container">
    <h2>Login</h2>
    
    <form action="edutriphome.html" method="post">
        <input type="text" placeholder="Username" required>
        <input type="password" placeholder="Password" required>
        
       <button type="submit">Go</button>
    </form>
</div>
</body>
</html>
